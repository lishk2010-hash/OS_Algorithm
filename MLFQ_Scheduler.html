<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多级反馈队列调度模拟器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --bg: #F5F2ED;
    --bg2: #EDE9E2;
    --bg3: #E4DFD6;
    --card: #FDFAF6;
    --border: #D6D0C6;
    --text: #2A2520;
    --text2: #6B6258;
    --text3: #9B9088;
    --accent: #C8521A;
    --accent2: #E07A3A;
    --mono: 'Space Mono', monospace;
    --sans: 'Noto Sans SC', sans-serif;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 24px;
  }

  h1 {
    font-family: var(--mono);
    font-size: 18px;
    letter-spacing: 0.05em;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 24px;
    font-family: var(--mono);
  }

  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 20px;
    align-items: start;
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }

  .panel-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 4px;
    margin-top: 12px;
  }
  label:first-of-type { margin-top: 0; }

  input[type=number], input[type=text] {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: var(--accent2); }

  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }

  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .tag {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tag .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .tag .rm {
    cursor: pointer;
    color: var(--text3);
    font-size: 14px;
    line-height: 1;
  }
  .tag .rm:hover { color: var(--accent); }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 7px;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary {
    background: var(--bg2);
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--bg3); }
  .btn-sm { padding: 5px 10px; font-size: 11px; }

  .controls-row {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  .speed-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    margin-left: auto;
  }
  input[type=range] {
    width: 80px;
    accent-color: var(--accent);
  }

  .viz { display: flex; flex-direction: column; gap: 16px; }

  .queue-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    transition: box-shadow 0.2s;
  }
  .queue-row.active-queue {
    box-shadow: 0 0 0 2px var(--accent2);
  }

  .queue-label { min-width: 90px; }
  .queue-name {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
  }
  .queue-tq {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    margin-top: 2px;
  }

  .queue-slots {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
    min-height: 36px;
    align-items: center;
  }

  .proc-chip {
    height: 32px;
    padding: 0 10px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 5px;
    border: 1.5px solid transparent;
    transition: transform 0.15s, opacity 0.15s;
    white-space: nowrap;
  }
  .proc-chip.running {
    border-style: solid;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    transform: translateY(-1px);
  }
  .proc-chip .remaining {
    font-size: 9px;
    opacity: 0.75;
  }

  .cpu-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .cpu-badge {
    background: var(--accent);
    color: #fff;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 5px;
    letter-spacing: 0.05em;
  }
  .cpu-info {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
  }
  .cpu-proc {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }

  .timeline-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .timeline-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .timeline-track {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
  }
  .tl-block {
    height: 24px;
    min-width: 22px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 9px;
    color: #fff;
    opacity: 0.9;
    padding: 0 4px;
  }

  .stats-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    flex: 1;
    min-width: 130px;
  }
  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }
  .stat-unit {
    font-size: 11px;
    color: var(--text3);
    margin-left: 2px;
  }

  .empty-hint {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    font-style: italic;
  }

  .section-sep {
    border: none;
    border-top: 1px solid var(--border);
    margin: 14px 0;
  }

  .status-bar {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    text-align: center;
    padding: 8px;
    background: var(--bg2);
    border-radius: 6px;
    margin-top: 12px;
  }
  .status-bar.done { color: #2A7A3B; background: #E8F5EC; }
  .status-bar.running-state { color: var(--accent); }
</style>
</head>
<body>

<h1>MLFQ Scheduler</h1>
<div class="subtitle">多级反馈队列调度模拟器</div>

<div class="layout">
  <div>
    <div class="panel" style="margin-bottom:16px">
      <div class="panel-title">队列配置</div>
      <label>队列数量</label>
      <input type="number" id="queueCount" value="3" min="1" max="6">
      <label>各队列时间片（逗号分隔）</label>
      <input type="text" id="queueSlices" value="2,4,8">
      <div style="margin-top:6px;font-size:11px;color:var(--text3);font-family:var(--mono)">最后一级为 FCFS（时间片无限）</div>
    </div>

    <div class="panel" style="margin-bottom:16px">
      <div class="panel-title">进程配置</div>
      <div class="row">
        <div>
          <label>进程名</label>
          <input type="text" id="procName" value="P1" maxlength="4">
        </div>
        <div>
          <label>执行时间</label>
          <input type="number" id="procBurst" value="6" min="1" max="50">
        </div>
      </div>
      <div style="margin-top:10px">
        <button class="btn btn-secondary btn-sm" onclick="addProcess()">+ 添加进程</button>
      </div>
      <hr class="section-sep">
      <div id="procList" class="tag-list"></div>
    </div>

    <div class="panel">
      <div class="panel-title">运行控制</div>
      <div class="controls-row">
        <button class="btn btn-primary btn-sm" id="btnStart" onclick="startSim()">▶ 开始</button>
        <button class="btn btn-secondary btn-sm" onclick="stepSim()">单步</button>
        <button class="btn btn-secondary btn-sm" onclick="resetSim()">重置</button>
        <span class="speed-label">速度</span>
        <input type="range" id="speedSlider" min="1" max="10" value="5">
      </div>
      <div id="statusBar" class="status-bar">就绪 — 点击"开始"运行</div>
    </div>
  </div>

  <div class="viz" id="vizArea">
    <div class="cpu-row" id="cpuRow">
      <div class="cpu-badge">CPU</div>
      <div>
        <div class="cpu-info">当前运行</div>
        <div class="cpu-proc" id="cpuProc">—</div>
      </div>
      <div style="margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--text3)" id="cpuDetail"></div>
    </div>

    <div id="queuesViz"></div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">时钟周期</div>
        <div class="stat-value" id="statClock">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">已完成</div>
        <div class="stat-value" id="statDone">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">平均等待时间</div>
        <div class="stat-value" id="statAvgWait">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">平均周转时间</div>
        <div class="stat-value" id="statAvgTA">—</div>
      </div>
    </div>

    <div class="timeline-wrap">
      <div class="timeline-title">执行时间线（最近 120 单位）</div>
      <div class="timeline-track" id="timeline"></div>
    </div>
  </div>
</div>

<script>
const COLORS = [
  {bg:'#C8521A'},{bg:'#1A78C8'},{bg:'#2A9B5A'},{bg:'#9B2AC8'},
  {bg:'#C8A01A'},{bg:'#C81A6B'},{bg:'#1AC8C0'},{bg:'#6B5A8D'},
];
const QUEUE_COLORS = ['#D4844A','#4A8DD4','#4AB870','#A04AD4','#D4B44A','#D44A8D'];

let processes = [];
let procIdCounter = 1;
let simState = null;
let simTimer = null;
let simRunning = false;

function addProcess() {
  const name = document.getElementById('procName').value.trim() || ('P'+procIdCounter);
  const burst = parseInt(document.getElementById('procBurst').value) || 4;
  const id = procIdCounter++;
  processes.push({id, name, burst, color: COLORS[(id-1) % COLORS.length]});
  document.getElementById('procName').value = 'P' + procIdCounter;
  renderProcList();
}

function removeProcess(id) {
  processes = processes.filter(p => p.id !== id);
  renderProcList();
}

function renderProcList() {
  const el = document.getElementById('procList');
  if (!processes.length) { el.innerHTML = '<span class="empty-hint">尚未添加进程</span>'; return; }
  el.innerHTML = processes.map(p => `
    <div class="tag">
      <span class="dot" style="background:${p.color.bg}"></span>
      <span>${p.name}</span>
      <span style="color:var(--text3)">T=${p.burst}</span>
      <span class="rm" onclick="removeProcess(${p.id})">×</span>
    </div>
  `).join('');
}

function getConfig() {
  const qCount = Math.min(6, Math.max(1, parseInt(document.getElementById('queueCount').value) || 3));
  const rawSlices = document.getElementById('queueSlices').value.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n) && n > 0);
  const slices = [];
  for (let i = 0; i < qCount; i++) slices.push(rawSlices[i] || Math.pow(2, i+1));
  return { qCount, slices };
}

function initSim() {
  const {qCount, slices} = getConfig();
  const queues = Array.from({length: qCount}, () => []);
  const procs = processes.map(p => ({
    ...p,
    remaining: p.burst,
    queueIdx: 0,
    arrivalTime: 0,
    finishTime: null,
    waitTime: 0,
    startedAt: null,
  }));
  procs.forEach(p => queues[0].push(p));
  return { queues, slices, qCount, clock: 0, running: null, runningTimeInSlice: 0, done: [], timeline: [] };
}

function simStep(state) {
  if (!state.running) {
    for (let qi = 0; qi < state.qCount; qi++) {
      if (state.queues[qi].length > 0) {
        state.running = state.queues[qi].shift();
        state.runningTimeInSlice = 0;
        if (state.running.startedAt === null) state.running.startedAt = state.clock;
        break;
      }
    }
    if (!state.running) { state.clock++; return false; }
  }

  const proc = state.running;
  const qi = proc.queueIdx;
  const tq = state.slices[qi];
  const isLastQueue = qi === state.qCount - 1;

  proc.remaining--;
  state.runningTimeInSlice++;
  state.timeline.push({name: proc.name, color: proc.color.bg, qi});
  state.clock++;

  if (proc.remaining <= 0) {
    proc.finishTime = state.clock;
    proc.waitTime = proc.finishTime - proc.burst - proc.arrivalTime;
    state.done.push(proc);
    state.running = null;
    state.runningTimeInSlice = 0;
  } else if (!isLastQueue && state.runningTimeInSlice >= tq) {
    proc.queueIdx = Math.min(qi + 1, state.qCount - 1);
    state.queues[proc.queueIdx].push(proc);
    state.running = null;
    state.runningTimeInSlice = 0;
  }

  return state.done.length >= processes.length;
}

function renderQueues(state) {
  const el = document.getElementById('queuesViz');
  el.innerHTML = state.queues.map((q, qi) => {
    const isActive = state.running && state.running.queueIdx === qi;
    const isLast = qi === state.qCount - 1;
    const runningChip = (state.running && state.running.queueIdx === qi) ? chipHTML(state.running, true) : '';
    const chips = q.map(p => chipHTML(p, false)).join('');
    return `<div class="queue-row ${isActive ? 'active-queue' : ''}" style="border-left:3px solid ${QUEUE_COLORS[qi]};margin-bottom:8px">
      <div class="queue-label">
        <div class="queue-name">Q${qi+1}</div>
        <div class="queue-tq">${isLast ? 'FCFS' : 'TQ='+state.slices[qi]}</div>
      </div>
      <div class="queue-slots">${runningChip}${chips || (!runningChip ? '<span class="empty-hint">空</span>' : '')}</div>
    </div>`;
  }).join('');
}

function chipHTML(p, isRunning) {
  const bg = isRunning ? p.color.bg : p.color.bg + '22';
  const textColor = isRunning ? '#fff' : p.color.bg;
  const border = isRunning ? p.color.bg : p.color.bg + '55';
  return `<div class="proc-chip ${isRunning ? 'running' : ''}" style="background:${bg};color:${textColor};border-color:${border}">
    ${p.name} <span class="remaining">剩${p.remaining}</span>
  </div>`;
}

function renderCPU(state) {
  if (state.running) {
    document.getElementById('cpuProc').innerHTML = `<span style="color:${state.running.color.bg}">${state.running.name}</span><span style="font-size:11px;color:var(--text3);margin-left:8px">剩余 ${state.running.remaining} 单位</span>`;
    document.getElementById('cpuDetail').textContent = `Q${state.running.queueIdx+1} · 时间片已用 ${state.runningTimeInSlice}`;
  } else {
    document.getElementById('cpuProc').textContent = state.done.length >= processes.length ? '全部完成' : '（空闲）';
    document.getElementById('cpuDetail').textContent = '';
  }
}

function renderTimeline(state) {
  const shown = state.timeline.slice(-120);
  document.getElementById('timeline').innerHTML = shown.map(t =>
    `<div class="tl-block" style="background:${t.color}" title="${t.name} Q${t.qi+1}">${t.name}</div>`
  ).join('');
}

function renderStats(state) {
  document.getElementById('statClock').textContent = state.clock;
  document.getElementById('statDone').textContent = state.done.length;
  if (state.done.length > 0) {
    const avgWait = (state.done.reduce((s,p)=>s+p.waitTime,0)/state.done.length).toFixed(1);
    const avgTA = (state.done.reduce((s,p)=>s+(p.finishTime-p.arrivalTime),0)/state.done.length).toFixed(1);
    document.getElementById('statAvgWait').innerHTML = avgWait+'<span class="stat-unit"> 单位</span>';
    document.getElementById('statAvgTA').innerHTML = avgTA+'<span class="stat-unit"> 单位</span>';
  }
}

function renderAll(state) {
  renderCPU(state); renderQueues(state); renderTimeline(state); renderStats(state);
}

function startSim() {
  if (processes.length === 0) { alert('请先添加进程'); return; }
  if (!simState) simState = initSim();
  if (simRunning) {
    simRunning = false; clearInterval(simTimer);
    document.getElementById('btnStart').textContent = '▶ 继续';
    setStatus('已暂停', false, false); return;
  }
  simRunning = true;
  document.getElementById('btnStart').textContent = '⏸ 暂停';
  setStatus('运行中…', true, false);
  const speed = parseInt(document.getElementById('speedSlider').value);
  simTimer = setInterval(() => {
    const done = simStep(simState);
    renderAll(simState);
    if (done) {
      clearInterval(simTimer); simRunning = false;
      document.getElementById('btnStart').textContent = '▶ 开始';
      setStatus('调度完成！所有进程已执行完毕', false, true);
    }
  }, Math.round(1000 / speed));
}

function stepSim() {
  if (processes.length === 0) { alert('请先添加进程'); return; }
  if (simRunning) { clearInterval(simTimer); simRunning = false; document.getElementById('btnStart').textContent = '▶ 继续'; }
  if (!simState) simState = initSim();
  const done = simStep(simState);
  renderAll(simState);
  if (done) setStatus('调度完成！所有进程已执行完毕', false, true);
  else setStatus('单步 — 时钟 ' + simState.clock, false, false);
}

function resetSim() {
  clearInterval(simTimer); simRunning = false; simState = null;
  document.getElementById('btnStart').textContent = '▶ 开始';
  document.getElementById('cpuProc').textContent = '—';
  document.getElementById('cpuDetail').textContent = '';
  document.getElementById('queuesViz').innerHTML = '';
  document.getElementById('timeline').innerHTML = '';
  document.getElementById('statClock').textContent = '0';
  document.getElementById('statDone').textContent = '0';
  document.getElementById('statAvgWait').textContent = '—';
  document.getElementById('statAvgTA').textContent = '—';
  setStatus('已重置 — 点击"开始"运行', false, false);
}

function setStatus(msg, isRunning, isDone) {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.className = 'status-bar' + (isDone ? ' done' : isRunning ? ' running-state' : '');
}

// Default processes
[{name:'P1',burst:8},{name:'P2',burst:4},{name:'P3',burst:12},{name:'P4',burst:3}].forEach(d => {
  const id = procIdCounter++;
  processes.push({id, name:d.name, burst:d.burst, color:COLORS[(id-1)%COLORS.length]});
});
renderProcList();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>进程状态转换演示</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #F5F7FA;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    color: #1a1a2e;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    text-align: center;
    font-size: 2rem;
    font-weight: 800;
    color: #1a1a2e;
    margin-bottom: 6px;
    letter-spacing: 2px;
  }
  .subtitle {
    text-align: center;
    font-size: 1rem;
    color: #666;
    margin-bottom: 20px;
  }

  /* ── 状态图区域 ── */
  .diagram {
    position: relative;
    width: 100%;
    max-width: 900px;
    height: 440px;
    margin: 0 auto 20px;
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  }
  svg#arrows {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* ── 节点 ── */
  .node {
    position: absolute;
    width: 120px;
    height: 64px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.15rem;
    font-weight: 700;
    border: 3px solid transparent;
    cursor: default;
    transition: transform .3s, box-shadow .3s, background .3s, border-color .3s;
    z-index: 2;
    text-align: center;
    line-height: 1.3;
    user-select: none;
  }
  .node.active {
    transform: scale(1.13);
    box-shadow: 0 0 0 5px #FFD600, 0 6px 24px rgba(0,0,0,0.18);
    border-color: #FFD600 !important;
    z-index: 10;
  }
  .node.flash {
    animation: flashNode .5s ease;
  }
  @keyframes flashNode {
    0%   { transform: scale(1.13); }
    50%  { transform: scale(1.25); }
    100% { transform: scale(1.13); }
  }

  /* 各状态颜色 */
  #n-create   { background:#E3F2FD; border-color:#1E88E5; color:#0D47A1; left:calc(50% - 60px); top:20px; }
  #n-run      { background:#E8F5E9; border-color:#43A047; color:#1B5E20; left:calc(50% - 60px); top:185px; }
  #n-term     { background:#FFEBEE; border-color:#E53935; color:#B71C1C; left:calc(50% - 60px); top:350px; }
  #n-active-ready  { background:#FFF8E1; border-color:#FB8C00; color:#E65100; left:60px; top:185px; }
  #n-static-ready  { background:#FFE0B2; border-color:#F4511E; color:#BF360C; left:60px; top:330px; }
  #n-active-block  { background:#F3E5F5; border-color:#8E24AA; color:#4A148C; right:60px; top:185px; }
  #n-static-block  { background:#EDE7F6; border-color:#5E35B1; color:#311B92; right:60px; top:330px; }

  /* 节点标签 */
  .node-label { font-size: .72rem; font-weight: 500; opacity: .75; display:block; }

  /* ── 箭头标签 ── */
  .arrow-label {
    font-size: .78rem;
    font-weight: 700;
    fill: #333;
    pointer-events: none;
  }
  .arrow-label.highlight {
    fill: #E53935;
    font-size: .85rem;
  }

  /* ── 控制面板 ── */
  .panel {
    max-width: 900px;
    margin: 0 auto 16px;
    background: #fff;
    border-radius: 16px;
    padding: 18px 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .panel h2 {
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 14px;
    color: #333;
    border-left: 5px solid #1E88E5;
    padding-left: 10px;
  }
  .btn-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .btn {
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform .15s, opacity .15s, box-shadow .15s;
    letter-spacing: .5px;
  }
  .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
  .btn:active:not(:disabled) { transform: scale(.96); }
  .btn:disabled { opacity: .35; cursor: not-allowed; }
  .btn.blue   { background:#1E88E5; color:#fff; }
  .btn.green  { background:#43A047; color:#fff; }
  .btn.orange { background:#FB8C00; color:#fff; }
  .btn.purple { background:#8E24AA; color:#fff; }
  .btn.red    { background:#E53935; color:#fff; }
  .btn.teal   { background:#00897B; color:#fff; }
  .btn.grey   { background:#757575; color:#fff; }

  /* ── 状态信息 ── */
  .info-bar {
    max-width: 900px;
    margin: 0 auto 16px;
    background: #fff;
    border-radius: 14px;
    padding: 14px 22px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .info-bar .cur-state {
    font-size: 1.3rem;
    font-weight: 800;
    color: #1E88E5;
    min-width: 180px;
  }
  .info-bar .cur-desc {
    font-size: 1rem;
    color: #444;
    flex: 1;
  }

  /* ── 日志 ── */
  .log-box {
    max-width: 900px;
    margin: 0 auto;
    background: #fff;
    border-radius: 14px;
    padding: 14px 22px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    max-height: 160px;
    overflow-y: auto;
  }
  .log-box h2 {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: #555;
  }
  .log-item {
    font-size: .95rem;
    color: #333;
    padding: 3px 0;
    border-bottom: 1px dashed #eee;
  }
  .log-item span { color: #1E88E5; font-weight: 700; }
  .log-item.new { color: #E53935; }

  /* reset btn */
  #resetBtn {
    float: right;
    margin-top: -2px;
    padding: 4px 14px;
    font-size: .9rem;
    border-radius: 8px;
    border: 2px solid #E53935;
    background: #fff;
    color: #E53935;
    cursor: pointer;
    font-weight: 700;
    transition: background .2s;
  }
  #resetBtn:hover { background: #FFEBEE; }
</style>
</head>
<body>

<h1>进程状态转换演示</h1>
<p class="subtitle">引入挂起后的七状态模型 · 点击操作按钮控制进程状态迁移</p>

<!-- 状态图 -->
<div class="diagram" id="diagram">
  <svg id="arrows"></svg>
  <div class="node" id="n-create">创建</div>
  <div class="node" id="n-run">执行<br><span class="node-label">Running</span></div>
  <div class="node" id="n-term">终止<br><span class="node-label">Terminated</span></div>
  <div class="node" id="n-active-ready">活动就绪<br><span class="node-label">Ready</span></div>
  <div class="node" id="n-static-ready">静止就绪<br><span class="node-label">Suspend Ready</span></div>
  <div class="node" id="n-active-block">活动阻塞<br><span class="node-label">Blocked</span></div>
  <div class="node" id="n-static-block">静止阻塞<br><span class="node-label">Suspend Blocked</span></div>
</div>

<!-- 当前状态信息 -->
<div class="info-bar">
  <div class="cur-state" id="curStateName">当前：创建</div>
  <div class="cur-desc" id="curStateDesc">进程已被创建，等待进入就绪队列。</div>
</div>

<!-- 控制面板 -->
<div class="panel">
  <h2>🎮 操作控制</h2>
  <div class="btn-grid" id="btnGrid"></div>
</div>

<!-- 日志 -->
<div class="log-box">
  <h2>📋 操作日志 <button id="resetBtn" onclick="resetAll()">重置</button></h2>
  <div id="logList"></div>
</div>

<script>
// ── 状态定义 ──
const STATES = {
  'create':       { label:'创建',    desc:'进程已被创建，等待进入就绪队列。' },
  'active-ready': { label:'活动就绪', desc:'进程在内存中，等待CPU调度。' },
  'run':          { label:'执行',    desc:'进程正在CPU上运行。' },
  'active-block': { label:'活动阻塞', desc:'进程在内存中，因等待某事件而阻塞。' },
  'static-block': { label:'静止阻塞', desc:'进程已被挂起（换出到外存），且仍处于阻塞状态。' },
  'static-ready': { label:'静止就绪', desc:'进程已被挂起（换出到外存），等待激活后调度。' },
  'term':         { label:'终止',    desc:'进程执行完毕或被撤销，占用资源将被释放。' },
};

// ── 转换定义: [from, to, 按钮文字, 按钮颜色, 说明]
const TRANSITIONS = [
  ['create',       'active-ready', '提交 / 进入就绪队列', 'blue',   '创建完成，进入活动就绪队列'],
  ['active-ready', 'run',          '调度（分配CPU）',     'green',  'CPU调度程序选中该进程'],
  ['run',          'active-ready', '时间片到 / 抢占',     'orange', 'CPU时间片用完或被高优先级抢占'],
  ['run',          'active-block', '等待事件 / I/O请求',  'purple', '进程请求I/O或等待某资源'],
  ['active-block', 'active-ready', '事件完成 / I/O完成',  'green',  '所等待事件发生，进入就绪队列'],
  ['run',          'term',         '正常/异常结束',        'red',    '进程执行完毕或被终止'],
  // 挂起
  ['active-ready', 'static-ready', '挂起就绪进程',        'grey',   '内存不足，将就绪进程换出到外存'],
  ['active-block', 'static-block', '挂起阻塞进程',        'grey',   '内存不足，将阻塞进程换出到外存'],
  ['static-ready', 'active-ready', '激活（调入内存）',    'teal',   '将静止就绪进程调回内存'],
  ['static-block', 'active-block', '激活（调入内存）',    'teal',   '将静止阻塞进程调回内存'],
  ['static-block', 'static-ready', '事件完成（挂起中）',  'teal',   '挂起状态下等待事件发生'],
  ['create',       'static-ready', '提交至外存就绪',      'grey',   '内存不足，新建进程直接进入静止就绪'],
];

let current = 'create';
let lastTransIdx = -1;

// ── 节点坐标（图中心点）──
function nodeCenter(id) {
  const d = document.getElementById('diagram');
  const n = document.getElementById('n-'+id);
  const dr = d.getBoundingClientRect();
  const nr = n.getBoundingClientRect();
  return {
    x: nr.left - dr.left + nr.width/2,
    y: nr.top  - dr.top  + nr.height/2,
    w: nr.width, h: nr.height
  };
}

// ── 画箭头 ──
const COLORS = {
  blue:'#1E88E5', green:'#43A047', orange:'#FB8C00',
  purple:'#8E24AA', red:'#E53935', teal:'#00897B', grey:'#9E9E9E'
};

function midPoint(p1, p2, bend) {
  const mx = (p1.x+p2.x)/2 + (bend||0)*-(p2.y-p1.y)/Math.hypot(p2.x-p1.x,p2.y-p1.y+.001);
  const my = (p1.y+p2.y)/2 + (bend||0)*(p2.x-p1.x)/Math.hypot(p2.x-p1.x,p2.y-p1.y+.001);
  return {x:mx, y:my};
}

function drawArrows() {
  const svg = document.getElementById('arrows');
  svg.innerHTML = '';
  // defs for markers
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');

  const allColors = [...new Set(TRANSITIONS.map(t=>t[3]))];
  allColors.forEach(c => {
    const col = COLORS[c];
    ['','_hl'].forEach(suffix => {
      const m = document.createElementNS('http://www.w3.org/2000/svg','marker');
      m.setAttribute('id','arr-'+c+suffix);
      m.setAttribute('markerWidth','8'); m.setAttribute('markerHeight','6');
      m.setAttribute('refX','8'); m.setAttribute('refY','3');
      m.setAttribute('orient','auto');
      const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      poly.setAttribute('points','0 0, 8 3, 0 6');
      poly.setAttribute('fill', suffix ? '#E53935' : col);
      m.appendChild(poly);
      defs.appendChild(m);
    });
  });
  svg.appendChild(defs);

  // bends per pair to avoid overlap
  const bendMap = {};
  TRANSITIONS.forEach((t,i) => {
    const key = [t[0],t[1]].sort().join('|');
    if(!bendMap[key]) bendMap[key]=[];
    bendMap[key].push(i);
  });

  TRANSITIONS.forEach((t, i) => {
    const [from, to, , color] = t;
    const isActive = (i === lastTransIdx);
    const p1 = nodeCenter(from);
    const p2 = nodeCenter(to);
    const key = [from,to].sort().join('|');
    const group = bendMap[key];
    const gIdx = group.indexOf(i);
    const bend = group.length>1 ? (gIdx===0?28:-28) : 14;

    const col = isActive ? '#E53935' : COLORS[color];
    const sw  = isActive ? 4 : 2;
    const op  = isActive ? 1 : 0.55;

    // quadratic bezier
    const dx = p2.x - p1.x, dy = p2.y - p1.y;
    const len = Math.hypot(dx,dy)||1;
    // shorten endpoints
    const shorten = 36;
    const x1 = p1.x + dx/len*shorten, y1 = p1.y + dy/len*shorten;
    const x2 = p2.x - dx/len*shorten, y2 = p2.y - dy/len*shorten;
    const perp = {x: -dy/len, y: dx/len};
    const cx = (x1+x2)/2 + perp.x*bend;
    const cy = (y1+y2)/2 + perp.y*bend;

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${x1},${y1} Q${cx},${cy} ${x2},${y2}`);
    path.setAttribute('stroke', col);
    path.setAttribute('stroke-width', sw);
    path.setAttribute('fill','none');
    path.setAttribute('opacity', op);
    path.setAttribute('marker-end', `url(#arr-${color}${isActive?'_hl':''})`);
    if(isActive) path.setAttribute('stroke-dasharray','6,3');
    svg.appendChild(path);

    // label at midpoint of bezier (t=0.5)
    const lx = .25*x1 + .5*cx + .25*x2;
    const ly = .25*y1 + .5*cy + .25*y2;
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x', lx); txt.setAttribute('y', ly);
    txt.setAttribute('text-anchor','middle');
    txt.setAttribute('dominant-baseline','middle');
    txt.setAttribute('class', isActive ? 'arrow-label highlight' : 'arrow-label');
    txt.setAttribute('opacity', isActive ? 1 : 0.7);
    const shortLabel = t[2].split('（')[0].split('/')[0].trim().slice(0,6);
    txt.textContent = shortLabel;
    svg.appendChild(txt);
  });
}

// ── 更新按钮 ──
function updateButtons() {
  const grid = document.getElementById('btnGrid');
  grid.innerHTML = '';
  const available = TRANSITIONS.filter(t => t[0] === current);
  if(available.length === 0) {
    grid.innerHTML = '<span style="color:#999;font-size:1rem;">当前状态无可用操作</span>';
    return;
  }
  available.forEach(t => {
    const idx = TRANSITIONS.indexOf(t);
    const btn = document.createElement('button');
    btn.className = `btn ${t[3]}`;
    btn.textContent = t[2];
    btn.onclick = () => doTransition(idx);
    grid.appendChild(btn);
  });
}

// ── 执行转换 ──
function doTransition(idx) {
  const t = TRANSITIONS[idx];
  const [from, to, label, , desc] = t;
  lastTransIdx = idx;
  current = to;

  // 高亮节点
  document.querySelectorAll('.node').forEach(n => n.classList.remove('active','flash'));
  const newNode = document.getElementById('n-'+to);
  newNode.classList.add('active','flash');
  setTimeout(()=>newNode.classList.remove('flash'),600);

  // 更新信息栏
  document.getElementById('curStateName').textContent = '当前：' + STATES[to].label;
  document.getElementById('curStateDesc').textContent = STATES[to].desc;

  // 日志
  const logList = document.getElementById('logList');
  const item = document.createElement('div');
  item.className = 'log-item new';
  item.innerHTML = `<span>▶ ${STATES[from].label} → ${STATES[to].label}</span>　${desc}`;
  logList.prepend(item);
  setTimeout(()=>item.classList.remove('new'),1500);

  drawArrows();
  updateButtons();
}

// ── 重置 ──
function resetAll() {
  current = 'create';
  lastTransIdx = -1;
  document.querySelectorAll('.node').forEach(n=>n.classList.remove('active','flash'));
  document.getElementById('n-create').classList.add('active');
  document.getElementById('curStateName').textContent = '当前：创建';
  document.getElementById('curStateDesc').textContent = STATES['create'].desc;
  document.getElementById('logList').innerHTML = '';
  drawArrows();
  updateButtons();
}

// ── 初始化 ──
window.addEventListener('load', () => {
  setTimeout(()=>{
    document.getElementById('n-create').classList.add('active');
    drawArrows();
    updateButtons();
  }, 80);
});
window.addEventListener('resize', () => { drawArrows(); });
</script>
</body>
</html>
